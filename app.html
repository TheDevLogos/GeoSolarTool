<script id="roof-ai-clean-module">
(function () {
  if (window.__GeoSolarRoofAICleanModule) return;
  window.__GeoSolarRoofAICleanModule = true;

  var ROOF_COLOR = '#0EA5E9';
  var AI_ROOF_KEY = '__roofAIDetected';
  var BTN_ID = 'roof-detection-ai-btn';
  var OBSERVER = null;

  function textOf(el) { return ((el && el.textContent) || '').trim(); }
  function findButton(regex) {
    return Array.prototype.slice.call(document.querySelectorAll('button')).find(function (btn) {
      return regex.test(textOf(btn));
    }) || null;
  }
  function getLeafletMap() {
    var mapEl = document.querySelector('.leaflet-container');
    if (!mapEl) return null;
    return mapEl._leaflet_map || mapEl._map || null;
  }
  function getAllLayers(map) {
    var layers = [];
    if (!map || typeof map.eachLayer !== 'function') return layers;
    map.eachLayer(function (layer) { layers.push(layer); });
    return layers;
  }
  function isRoofLayer(layer) {
    return !!(layer && layer.getLatLngs && layer.options && !layer[AI_ROOF_KEY] && (layer.options.color === ROOF_COLOR || layer.options.fillColor === ROOF_COLOR));
  }
  function getSeedRoofLayers(map) { return getAllLayers(map).filter(isRoofLayer); }
  function clearDetectedRoofs(map) {
    getAllLayers(map).forEach(function (layer) {
      if (layer && layer[AI_ROOF_KEY]) { try { map.removeLayer(layer); } catch (e) {} }
    });
  }
  function normalizeCoords(coords) {
    return (coords || []).map(function (point) {
      if (Array.isArray(point) && point.length >= 2) return window.L.latLng(Number(point[0]), Number(point[1]));
      if (point && point.lat !== undefined && point.lng !== undefined) return window.L.latLng(Number(point.lat), Number(point.lng));
      return null;
    }).filter(Boolean);
  }
  function fallbackFromLayer(layer) {
    var coords = layer.getLatLngs()[0] || layer.getLatLngs();
    if (!coords || coords.length < 3) return [];
    var centroid = coords.reduce(function (acc, c) { acc.lat += c.lat; acc.lng += c.lng; return acc; }, { lat: 0, lng: 0 });
    centroid.lat /= coords.length; centroid.lng /= coords.length;
    return [{
      confidence: 0.78,
      polygon: coords.map(function (c) { return [centroid.lat + (c.lat - centroid.lat) * 0.88, centroid.lng + (c.lng - centroid.lng) * 0.88]; }),
      note: 'Contorno estimado localmente'
    }];
  }
  function buildRequestPayload(layer) {
    var coords = layer.getLatLngs()[0] || layer.getLatLngs();
    var minLat = 90, maxLat = -90, minLng = 180, maxLng = -180;
    coords.forEach(function (c) {
      if (c.lat < minLat) minLat = c.lat;
      if (c.lat > maxLat) maxLat = c.lat;
      if (c.lng < minLng) minLng = c.lng;
      if (c.lng > maxLng) maxLng = c.lng;
    });
    return { area: { polygon: coords.map(function (c) { return [c.lat, c.lng]; }), bounds: { north: maxLat, south: minLat, east: maxLng, west: minLng } } };
  }
  async function detectRoofsForLayer(layer) {
    try {
      var response = await fetch('/api/roof-detection', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(buildRequestPayload(layer))
      });
      if (!response.ok) throw new Error('roof-detection unavailable');
      var data = await response.json();
      if (data && data.success && Array.isArray(data.roofs) && data.roofs.length) return data.roofs;
      return fallbackFromLayer(layer);
    } catch (error) {
      return fallbackFromLayer(layer);
    }
  }
  function drawDetectedRoofs(map, roofGroups) {
    var detectedCount = 0;
    roofGroups.forEach(function (group) {
      (group || []).forEach(function (roof) {
        var latlngs = normalizeCoords(roof.polygon);
        if (latlngs.length < 3) return;
        var polygon = window.L.polygon(latlngs, { color: ROOF_COLOR, fillColor: ROOF_COLOR, fillOpacity: 0.35, weight: 2.5 }).addTo(map);
        polygon[AI_ROOF_KEY] = true;
        polygon.bindTooltip((roof.note || 'Techo detectado por IA') + ' · ' + Math.round(Number(roof.confidence || 0.9) * 100) + '%', { sticky: true });
        detectedCount += 1;
      });
    });

  }
  async function runRoofDetection() {
    var button = document.getElementById(BTN_ID);
    var map = getLeafletMap();

    var seedLayers = getSeedRoofLayers(map);
    if (!seedLayers.length) { alert('Por favor delimite al menos un área Aprovechable principal antes de ejecutar la detección de techos con IA.'); return; }
    if (button) { button.disabled = true; button.textContent = '⏳ Analizando Techos...'; }
    try {
      clearDetectedRoofs(map);
      var roofGroups = await Promise.all(seedLayers.map(detectRoofsForLayer));
      seedLayers.forEach(function (layer) { try { map.removeLayer(layer); } catch (e) {} });

  }

    var microBtn = findButton(/Detectar Microáreas/i);
    if (!microBtn) return false;
    if (document.getElementById(BTN_ID)) return true;
    var parent = microBtn.parentElement;
    if (!parent) return false;

    var roofBtn = document.createElement('button');
    roofBtn.id = BTN_ID;
    roofBtn.type = 'button';
    roofBtn.className = 'roof-ai-btn';
    roofBtn.textContent = '🛰️ Detección de Techos con IA';
    roofBtn.addEventListener('click', runRoofDetection);
    parent.appendChild(roofBtn);
    var card = microBtn.closest('div');
    if (card) {
      var paragraph = card.querySelector('p');
      if (paragraph && !/techos automáticamente con IA/i.test(paragraph.textContent || '')) {
        paragraph.textContent = (paragraph.textContent || '') + ' También puedes detectar y trazar techos automáticamente con IA sobre el área delimitada.';
      }

  }

</script>
